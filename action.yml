name: Agentic Risk Scan
description: Scan GitHub Actions, MCP configs, and agent instruction files for AI-agent security risks.
author: Agentic Risk Scan Contributors

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  format:
    description: Output format: text, json, markdown, or sarif.
    required: false
    default: "sarif"
  output:
    description: Report output path.
    required: false
    default: "agentic-risk.sarif"
  fail-on:
    description: Severity threshold that fails the job, or none.
    required: false
    default: "high"
  baseline:
    description: Optional baseline file.
    required: false
    default: ""
  config:
    description: Optional JSON config file.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install scanner
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Run scanner
      shell: bash
      run: |
        set -euo pipefail
        args=(scan "${{ inputs.path }}" --format "${{ inputs.format }}" --output "${{ inputs.output }}" --fail-on "${{ inputs.fail-on }}")
        if [ -n "${{ inputs.baseline }}" ]; then
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        if [ -n "${{ inputs.config }}" ]; then
          args+=(--config "${{ inputs.config }}")
        fi
        agentic-risk-scan "${args[@]}"

