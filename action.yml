name: Agentic Risk Scan
description: Scan GitHub Actions, MCP configs, and agent instruction files for AI-agent security risks.
author: Agentic Risk Scan Contributors

inputs:
  command:
    description: Command to run: scan, report, or inventory.
    required: false
    default: "scan"
  path:
    description: Repository path to scan.
    required: false
    default: "."
  format:
    description: Output format. scan supports text/json/markdown/sarif/github; report supports markdown/html; inventory supports text/json/markdown.
    required: false
    default: "sarif"
  output:
    description: Report output path.
    required: false
    default: "agentic-risk.sarif"
  fail_on:
    description: Severity threshold that fails the job, or none.
    required: false
    default: "high"
  baseline:
    description: Optional baseline file.
    required: false
    default: ""
  config:
    description: Optional JSON config file.
    required: false
    default: ""
  changed_from:
    description: Optional git ref; when set, only files changed from this ref are scanned.
    required: false
    default: ""
  changed_to:
    description: Git ref used with changed_from.
    required: false
    default: "HEAD"
  diff_filter:
    description: Git diff-filter used with changed_from.
    required: false
    default: "ACMR"

runs:
  using: composite
  steps:
    - name: Install scanner
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Run scanner
      shell: bash
      run: |
        set -euo pipefail
        command="${{ inputs.command }}"
        case "$command" in
          scan|report|inventory) ;;
          *)
            echo "unsupported command: $command" >&2
            exit 2
            ;;
        esac

        format="${{ inputs.format }}"
        output="${{ inputs.output }}"
        if [ "$command" = "report" ] && [ "$format" = "sarif" ]; then
          format="html"
        fi
        if [ "$command" = "report" ] && [ "$output" = "agentic-risk.sarif" ]; then
          output="agentic-risk-report.html"
        fi
        if [ "$command" = "inventory" ] && [ "$format" = "sarif" ]; then
          format="markdown"
        fi
        if [ "$command" = "inventory" ] && [ "$output" = "agentic-risk.sarif" ]; then
          output="agentic-risk-inventory.md"
        fi

        args=("$command" "${{ inputs.path }}" --format "$format" --output "$output")
        if [ "$command" != "inventory" ]; then
          args+=(--fail-on "${{ inputs.fail_on }}")
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          if [ "$command" = "inventory" ]; then
            echo "baseline is only supported for scan and report" >&2
            exit 2
          fi
          args+=(--baseline "${{ inputs.baseline }}")
        fi
        if [ -n "${{ inputs.config }}" ]; then
          args+=(--config "${{ inputs.config }}")
        fi
        if [ -n "${{ inputs.changed_from }}" ]; then
          if [ "$command" = "inventory" ]; then
            echo "changed_from is only supported for scan and report" >&2
            exit 2
          fi
          args+=(--changed-from "${{ inputs.changed_from }}" --changed-to "${{ inputs.changed_to }}" --diff-filter "${{ inputs.diff_filter }}")
        fi
        agentic-risk-scan "${args[@]}"
