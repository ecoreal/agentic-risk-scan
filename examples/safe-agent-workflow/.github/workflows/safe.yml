name: safe-agent-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read metadata from event file
        run: python scripts/summarize_event.py "$GITHUB_EVENT_PATH"

